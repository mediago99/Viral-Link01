<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral Movie Hub Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <script src='//libtl.com/sdk.js' data-zone='10500197' data-sdk='show_10500197'></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0f102b;
            --card-bg: #1a1b3d;
            --accent-color: #a855f7;
            --text-color: #ffffff;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }
        .header { text-align: center; padding: 20px; background: var(--card-bg); border-radius: 0 0 25px 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .header h1 { color: var(--accent-color); margin: 0; font-size: 22px; text-transform: uppercase; }
        .movie-card { background: var(--card-bg); margin: 15px; border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .movie-card img { width: 100%; height: 210px; object-fit: cover; }
        .movie-info { padding: 15px; }
        .unlock-btn { background: linear-gradient(90deg, #ff8a00, #e52e71); border: none; color: white; padding: 14px; width: 100%; border-radius: 30px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: 0.3s; }
        .unlock-btn:disabled { background: #444 !important; cursor: not-allowed; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #161730; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.1); z-index: 1000; }
        .nav-item { text-align: center; color: #8e8e93; font-size: 11px; cursor: pointer; flex: 1; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent-color); }
    </style>
</head>
<body>

<div id="home-page">
    <div class="header">
        <h1>VIRAL ZONE <i class="fa fa-fire"></i></h1>
        <p style="font-size: 11px; opacity: 0.6;">Watch Ads to Unlock Movies</p>
    </div>
    <div id="movie-list"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// Firebase Init
const firebaseConfig = { databaseURL: "https://viralmoviehubbd-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Monetag Direct Link (আপনার স্মার্টলিঙ্ক)
const MONETAG_SMARTLINK = "https://omg10.com/4/10611800";
let counts = JSON.parse(localStorage.getItem('adCounts')) || {};

function loadMovies() {
    db.ref('movies').on('value', (snapshot) => {
        const list = document.getElementById('movie-list');
        list.innerHTML = '';
        snapshot.forEach((child) => {
            const movie = child.val();
            const id = child.key;
            if(!counts[id]) counts[id] = 0;
            
            const btnText = counts[id] >= 5 ? "WATCH NOW" : `UNLOCK — ${counts[id]}/5 ADS`;
            const btnColor = counts[id] >= 5 ? "green" : "";

            list.innerHTML += `
            <div class="movie-card">
                <img src="${movie.image_url || movie.img}"> 
                <div class="movie-info">
                    <h3>${movie.title || movie.name}</h3>
                    <button class="unlock-btn" style="background: ${btnColor}" onclick="handleAction('${id}', '${movie.video_url || movie.url}')" id="btn-${id}">
                        ${btnText}
                    </button>
                </div>
            </div>`;
        });
    });
}

async function handleAction(id, url) {
    if(counts[id] < 5) {
        const btn = document.getElementById(`btn-${id}`);
        btn.disabled = true;
        
        // ১. পপ-আপ অ্যাড দেখানোর চেষ্টা
        if (typeof show_10500197 === 'function') {
            show_10500197().then(() => {
                processAd(id, url);
            }).catch(() => {
                // যদি SDK কাজ না করে তবে স্মার্টলিঙ্ক ওপেন হবে
                window.open(MONETAG_SMARTLINK, '_blank');
                processAd(id, url);
            });
        } else {
            window.open(MONETAG_SMARTLINK, '_blank');
            processAd(id, url);
        }
    } else {
        // ৫টি অ্যাড দেখা শেষ হলে স্মার্টলিঙ্কের মাধ্যমে মুভি ওপেন হবে (ডাবল ইনকাম)
        window.open(MONETAG_SMARTLINK, '_blank'); 
        setTimeout(() => {
            window.location.href = url;
        }, 1000);
    }
}

function processAd(id, url) {
    let sec = 15; // ১৫ সেকেন্ড ওয়েট টাইম
    const btn = document.getElementById(`btn-${id}`);
    
    const timer = setInterval(() => {
        sec--;
        btn.innerHTML = `অ্যাড ভেরিফাই হচ্ছে... ${sec}s`;
        if(sec <= 0) {
            clearInterval(timer);
            counts[id]++;
            localStorage.setItem('adCounts', JSON.stringify(counts));
            btn.disabled = false;
            updateUI(id, url);
        }
    }, 1000);
}

function updateUI(id, url) {
    const b = document.getElementById(`btn-${id}`);
    if(counts[id] >= 5) {
        b.innerHTML = "WATCH NOW";
        b.style.background = "green";
    } else {
        b.innerHTML = `UNLOCK — ${counts[id]}/5 ADS`;
    }
}

// অ্যাপ খোলার সাথে সাথে একটি ইন্টারস্টিশিয়াল অ্যাড লোড হবে
window.onload = () => {
    loadMovies();
    setTimeout(() => {
        if(typeof show_10500197 === 'function') show_10500197();
    }, 3000);
};

</script>
</body>
    </html>
